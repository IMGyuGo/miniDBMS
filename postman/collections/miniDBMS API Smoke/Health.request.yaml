$kind: http-request
url: "{{base_url}}/health"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('status is 200', function () {
        pm.response.to.have.status(200);
      });
      var body = pm.response.json();
      pm.test('health payload is OK', function () {
        pm.expect(body.ok).to.eql(true);
        pm.expect(body.code).to.eql('OK');
        pm.expect(body.message).to.eql('healthy');
      });
    language: text/javascript
order: 1000

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 600" width="740" height="600" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="740" height="600" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="370" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#e2e8f0" letter-spacing="1">스레드 풀 — 요청 처리 흐름</text>

  <!-- ── Step 1: Client ── -->
  <rect x="270" y="54" width="200" height="44" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="370" y="72" text-anchor="middle" font-size="12" fill="#38bdf8" font-weight="bold">클라이언트 요청</text>
  <text x="370" y="89" text-anchor="middle" font-size="11" fill="#94a3b8">HTTP POST /query</text>

  <!-- Arrow -->
  <line x1="370" y1="98" x2="370" y2="120" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="370,126 365,116 375,116" fill="#64748b"/>

  <!-- ── Step 2: HTTP Server ── -->
  <rect x="230" y="128" width="280" height="60" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="370" y="148" text-anchor="middle" font-size="12" fill="#a78bfa" font-weight="bold">HTTP Server</text>
  <text x="370" y="166" text-anchor="middle" font-size="11" fill="#94a3b8">mutex lock → 잡 큐에 적재</text>
  <text x="370" y="182" text-anchor="middle" font-size="11" fill="#94a3b8">cond_signal → mutex unlock</text>

  <!-- Arrow -->
  <line x1="370" y1="188" x2="370" y2="210" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="370,216 365,206 375,206" fill="#64748b"/>

  <!-- cond_signal annotation -->
  <text x="510" y="205" font-size="10" fill="#34d399">잠든 워커 깨움 (cond_signal)</text>
  <line x1="505" y1="202" x2="465" y2="200" stroke="#34d399" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ── Step 3: Worker Thread ── -->
  <rect x="200" y="218" width="340" height="72" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="370" y="238" text-anchor="middle" font-size="12" fill="#34d399" font-weight="bold">Worker Thread</text>
  <text x="370" y="256" text-anchor="middle" font-size="11" fill="#94a3b8">cond_wait에서 깨어남</text>
  <text x="370" y="272" text-anchor="middle" font-size="11" fill="#94a3b8">mutex lock → 큐에서 잡 꺼냄 → mutex unlock</text>

  <!-- Arrow down to branch -->
  <line x1="370" y1="290" x2="370" y2="310" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="370,316 365,306 375,306" fill="#64748b"/>

  <!-- Branch label -->
  <rect x="310" y="318" width="120" height="20" rx="4" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="370" y="332" text-anchor="middle" font-size="11" fill="#e2e8f0">SQL 종류 판별</text>

  <!-- Left branch: SELECT -->
  <line x1="310" y1="338" x2="200" y2="368" stroke="#38bdf8" stroke-width="1.5"/>
  <polygon points="196,372 196,362 206,368" fill="#38bdf8"/>
  <text x="230" y="360" font-size="10" fill="#38bdf8">SELECT</text>

  <!-- Right branch: INSERT -->
  <line x1="430" y1="338" x2="540" y2="368" stroke="#fb7185" stroke-width="1.5"/>
  <polygon points="544,372 534,368 544,362" fill="#fb7185"/>
  <text x="462" y="360" font-size="10" fill="#fb7185">INSERT</text>

  <!-- ── SELECT box ── -->
  <rect x="60" y="374" width="240" height="64" rx="8" fill="#0c2231" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="180" y="394" text-anchor="middle" font-size="12" fill="#38bdf8" font-weight="bold">rdlock (읽기 잠금)</text>
  <text x="180" y="412" text-anchor="middle" font-size="11" fill="#94a3b8">여러 스레드 동시 처리</text>
  <text x="180" y="430" text-anchor="middle" font-size="11" fill="#94a3b8">SELECT 병렬 실행 가능</text>

  <!-- ── INSERT box ── -->
  <rect x="440" y="374" width="240" height="64" rx="8" fill="#2d1515" stroke="#fb7185" stroke-width="1.5"/>
  <text x="560" y="394" text-anchor="middle" font-size="12" fill="#fb7185" font-weight="bold">wrlock (쓰기 잠금)</text>
  <text x="560" y="412" text-anchor="middle" font-size="11" fill="#94a3b8">단독 쓰기 — 나머지 대기</text>
  <text x="560" y="430" text-anchor="middle" font-size="11" fill="#94a3b8">데이터 일관성 보장</text>

  <!-- Both merge down to db_service_execute_sql -->
  <line x1="180" y1="438" x2="180" y2="466" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="560" y1="438" x2="560" y2="466" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- merge horizontal -->
  <line x1="180" y1="466" x2="560" y2="466" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="370" y1="466" x2="370" y2="484" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="370,490 365,480 375,480" fill="#f59e0b"/>

  <!-- ── db_service_execute_sql ── -->
  <rect x="200" y="492" width="340" height="44" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="370" y="512" text-anchor="middle" font-size="12" fill="#f59e0b" font-weight="bold">db_service_execute_sql()</text>
  <text x="370" y="530" text-anchor="middle" font-size="11" fill="#94a3b8">DB 엔진 단일 진입점 → 결과 반환</text>

  <!-- Arrow down to response -->
  <line x1="370" y1="536" x2="370" y2="556" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="370,562 365,552 375,552" fill="#64748b"/>

  <!-- ── Response + back to cond_wait ── -->
  <rect x="250" y="562" width="240" height="28" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.2"/>
  <text x="370" y="581" text-anchor="middle" font-size="11" fill="#94a3b8">응답 전송 → cond_wait (대기 복귀)</text>
</svg>
